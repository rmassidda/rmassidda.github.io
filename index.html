<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="author" content="Riccardo Massidda">

    <link href="https://fonts.googleapis.com/css?family=Source+Serif+Pro:400,600" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU"
        crossorigin="anonymous">
    <title>Riccardo Massidda</title>

    <!-- Bootstrap core CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
    <script src="js/obfuscation.js" defer></script>
    <!-- <script src="js/canvas.js" defer></script> -->
    <script src="js/kindle.js" defer></script>
    <style>
    .container{
        font-family: 'Source Serif Pro', serif;
        position:absolute;
        width: 100%;
        top: 5%;
        left: 5%;
        right: 5%;
        width: 90%;
    }

    @media(min-width:768px){
        .container{
            top: 10%;
            left: 10%;
            right: 10%;
            width: 80%;
        }
    }
    @media(min-width:992px){
        .container{
            top: 25%;
            left: 25%;
            right: 25%;
            width: 50%;
        }
    }
    a{
        color: #24367e;
    }
    a:hover{
        text-decoration: none;
    }
    li{
        margin:0 10px 10px 0;
        vertical-align:top;
        width: 100%;
    }

    #title {
        font-weight: bold;
    }
    #author {
        font-style: italic;
    }
    #citation {
        font-size: 110%;
    }
    #highlight {
      background-color: black;
      display: inline-block;
      text-align: left;
    }
    h1 {
      font-weight: 700;
      color: white;
    }
    
    .soft {
        color: rgba(50,50,50,0.3);
        font-size: 90%;
    }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-4">
              <div id="highlight">
                  <h1>Riccardo Massidda</h1>
              </div>
                <p class="lead">Computer scientist</p>
                <ul class="list-unstyled">
                    <li><span class="fab fa-github"></span>&emsp;<a href="https://github.com/rmassidda">rmassidda</a></li>
                    <li><span class="fab fa-linkedin"></span>&emsp;<a href="https://www.linkedin.com/in/riccardomassidda">linkedin</a></li>
                    <li id="address"></li>
                </ul>
            </div>
            <div class="col-lg-2"></div>
            <div class="col-lg-6">
                <!-- <canvas id="rand_canvas" ></canvas> -->
                <div id="kindle">
                    <p id="citation"></p>
                    <p><span id="title"></span> by <span id="author"></span></p>
                    <p class="soft">highlighted on my Kindle on <span id="date"></span></p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
